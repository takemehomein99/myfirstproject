name: Web Terminal via Cloudflare (Root VPS)

on:
  workflow_dispatch:

jobs:
  oprek-server:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. Install ttyd & cloudflared
        run: |
          echo "Mengunduh ttyd (Web Terminal)..."
          curl -sL https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64 -o ttyd
          sudo mv ttyd /usr/local/bin/ttyd
          sudo chmod +x /usr/local/bin/ttyd

          echo "Mengunduh cloudflared..."
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          sudo mv cloudflared /usr/local/bin/cloudflared
          sudo chmod +x /usr/local/bin/cloudflared

      - name: 2. Persiapan Python3, pip3, hopx-ai & Clone Repo
        run: |
          echo "Menginstal Python3 dan pip3..."
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip git

          echo "Menginstal hopx-ai via pip..."
          sudo pip3 install hopx-ai

          echo "Clone repository free-vps ke dalam direktori root..."
          sudo git clone https://github.com/buddyshadow00/free-vps /root/free-vps

      - name: 3. Start Web Terminal (Otomatis Root) & Tunnel
        run: |
          echo "Menjalankan Terminal Web di background sebagai ROOT..."
          # Masuk ke folder target, lalu jalankan ttyd sebagai superuser (root)
          sudo bash -c 'cd /root/free-vps && ttyd -p 8080 -W bash > /tmp/ttyd.log 2>&1 &'

          echo "Menjalankan Cloudflare Tunnel..."
          cloudflared tunnel --url http://localhost:8080 > cloudflare.log 2>&1 &
          
          echo "Menunggu koneksi ke server Cloudflare (10 detik)..."
          sleep 10
          
          echo "=========================================================="
          echo "🔥 WEB TERMINAL ROOT READY! 🔥"
          echo "Klik URL di bawah ini untuk buka terminal di browser:"
          grep -o 'https://[^[:space:]]*\.trycloudflare\.com' cloudflare.log
          echo "=========================================================="

      - name: 4. Keep Alive
        run: |
          echo "Server sedang ditahan agar tidak mati otomatis..."
          echo "Jatah maksimal GitHub Actions adalah 6 Jam."
          echo "Jangan lupa klik 'Cancel workflow' kalau sudah selesai ngoprek!"
          sleep 6h
